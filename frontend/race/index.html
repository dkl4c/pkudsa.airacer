<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Racer 回放</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d0d0d;
  --surface: #1a1a1a;
  --surface2: #222;
  --border: #333;
  --text: #e8e8e8;
  --text-dim: #888;
  --accent: #3b82f6;
  --accent2: #22c55e;
  --danger: #ef4444;
  --warn: #f59e0b;
  --radius: 8px;
  --font: system-ui, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

/* ── Session list ─────────────────────────────── */
#session-list {
  display: none;
  min-height: 100vh;
  padding: 40px 20px;
  background: var(--bg);
  overflow-y: auto;
}

#session-list h2 {
  font-size: 22px;
  margin-bottom: 24px;
  color: var(--text);
  border-left: 3px solid var(--accent);
  padding-left: 12px;
}

.session-card {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 10px;
  max-width: 800px;
  margin-left: auto;
  margin-right: auto;
  transition: border-color 0.15s, background 0.15s;
}
.session-card:hover {
  border-color: var(--accent);
  background: var(--surface2);
}
.session-id {
  font-size: 15px;
  font-weight: 600;
  font-family: monospace;
  color: var(--text);
  margin-bottom: 4px;
}
.session-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}
.session-time {
  color: var(--text-dim);
  font-size: 12px;
}
.session-teams {
  font-size: 12px;
  color: var(--text-dim);
}
.type-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  background: var(--accent);
  color: #fff;
}
.finish-badge {
  display: inline-block;
  padding: 1px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}
.finish-badge.finish-normal { background: var(--accent2); color: #fff; }
.finish-badge.finish-timeout { background: var(--warn); color: #000; }
.finish-badge.finish-aborted { background: var(--danger); color: #fff; }

.btn-play-session {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 20px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--radius);
  text-decoration: none;
  font-weight: 600;
  font-size: 13px;
  transition: background 0.15s, transform 0.1s;
  white-space: nowrap;
  flex-shrink: 0;
  margin-left: 16px;
}
.btn-play-session:hover {
  background: #2563eb;
  transform: translateY(-1px);
}

.loading-msg { color: var(--text-dim); padding: 40px; text-align: center; }
.empty-msg { color: var(--text-dim); padding: 40px; text-align: center; font-size: 15px; }
.error-msg { color: var(--danger); padding: 40px; text-align: center; }

/* ── Player layout ────────────────────────────── */
#player {
  display: none;
  flex-direction: column;
  height: 100vh;
  width: 100vw;
  overflow: hidden;
}

/* Header */
#header-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 50px;
  background: #111;
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo {
  font-weight: 700;
  font-size: 15px;
  color: var(--accent);
  letter-spacing: 0.5px;
}
.session-name {
  font-size: 14px;
  color: var(--text);
  font-family: monospace;
}
.session-type-badge {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}
.replay-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  background: #333;
  color: var(--text-dim);
  font-weight: 600;
  letter-spacing: 1px;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
#header-time {
  font-family: monospace;
  font-size: 14px;
  color: var(--accent2);
}
.btn-back {
  font-size: 12px;
  color: var(--text-dim);
  text-decoration: none;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  transition: color 0.15s, border-color 0.15s;
}
.btn-back:hover { color: var(--text); border-color: #555; }

/* Main area */
#main-area {
  display: flex;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}

/* Canvas */
#minimap-container {
  flex: 0 0 600px;
  background: #111;
  display: flex;
  align-items: center;
  justify-content: center;
  border-right: 1px solid var(--border);
  position: relative;
}
#minimap {
  display: block;
  width: 600px;
  height: 380px;
}

/* Leaderboard panel */
#leaderboard-panel {
  flex: 1;
  background: var(--surface);
  overflow-y: auto;
  padding: 12px;
  min-width: 220px;
}
.lb-header {
  font-size: 12px;
  font-weight: 700;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}
.final-header {
  color: var(--accent2);
  font-size: 14px;
  text-transform: none;
  letter-spacing: 0;
}
.lb-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.lb-table thead tr {
  border-bottom: 1px solid var(--border);
}
.lb-table th {
  text-align: left;
  color: var(--text-dim);
  font-weight: 600;
  font-size: 11px;
  padding: 4px 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.lb-table td {
  padding: 6px 6px;
  border-bottom: 1px solid #222;
  vertical-align: middle;
}
.lb-table tr.leader td {
  background: rgba(59,130,246,0.08);
}
.lb-table tr.leader .lb-rank {
  color: var(--accent);
  font-weight: 700;
}
.lb-rank { color: var(--text-dim); font-weight: 600; width: 24px; }
.lb-name { font-weight: 500; }
.lb-lap, .lb-best, .lb-speed, .lb-time { font-family: monospace; font-size: 12px; color: var(--text-dim); }

.status-badge {
  display: inline-block;
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 3px;
  font-weight: 700;
  margin-left: 4px;
  vertical-align: middle;
}
.status-dq { background: #333; color: #888; }
.status-stopped { background: var(--warn); color: #000; }
.status-finished { background: var(--accent2); color: #000; }

/* Controls */
#controls {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: #111;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

button {
  cursor: pointer;
  font-family: var(--font);
  border: none;
  outline: none;
}

#btn-play {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: var(--accent);
  color: #fff;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, transform 0.1s;
  flex-shrink: 0;
}
#btn-play:hover:not(:disabled) { background: #2563eb; transform: scale(1.05); }
#btn-play:disabled { background: #333; color: #666; cursor: not-allowed; }

#btn-rewind {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--border);
  transition: background 0.15s;
  flex-shrink: 0;
}
#btn-rewind:hover { background: #333; color: var(--text); }

#timeline {
  flex: 1;
  min-width: 120px;
  height: 4px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 2px;
  outline: none;
  cursor: pointer;
}
#timeline::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  transition: transform 0.1s;
}
#timeline::-webkit-slider-thumb:hover { transform: scale(1.3); }
#timeline::-moz-range-thumb {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: none;
}

#time-display {
  font-family: monospace;
  font-size: 13px;
  color: var(--text-dim);
  white-space: nowrap;
  flex-shrink: 0;
}

.speed-btn {
  padding: 4px 10px;
  border-radius: 4px;
  background: var(--surface2);
  color: var(--text-dim);
  font-size: 12px;
  font-weight: 600;
  border: 1px solid var(--border);
  transition: background 0.1s, color 0.1s, border-color 0.1s;
  flex-shrink: 0;
}
.speed-btn:hover { background: #333; color: var(--text); }
.speed-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

#btn-final {
  padding: 4px 12px;
  border-radius: 4px;
  background: var(--accent2);
  color: #000;
  font-size: 12px;
  font-weight: 600;
  border: none;
  transition: background 0.1s;
  flex-shrink: 0;
}
#btn-final:hover { background: #16a34a; color: #fff; }

/* Event log */
#event-log {
  padding: 6px 16px;
  background: var(--bg);
  border-top: 1px solid var(--border);
  font-size: 12px;
  color: var(--text-dim);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
  min-height: 28px;
  line-height: 16px;
}
.ev-item { color: var(--text); }
.ev-item.ev-new { color: var(--accent2); }
.ev-sep { color: var(--border); }

/* Loading overlay */
#loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
  flex-direction: column;
  gap: 12px;
}
.loading-spinner {
  width: 36px;
  height: 36px;
  border: 3px solid #333;
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
#load-progress {
  font-size: 12px;
  color: #aaa;
}

/* Error banner */
.error-banner {
  background: #2d0a0a;
  border: 1px solid var(--danger);
  color: var(--danger);
  padding: 10px 20px;
  font-size: 13px;
  flex-shrink: 0;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #555; }
</style>
</head>
<body>

<!-- Session list (shown when no ?session param) -->
<div id="session-list"></div>

<!-- Player (shown when ?session param is present) -->
<div id="player">
  <!-- Header -->
  <div id="header-bar">
    <div class="header-left">
      <span class="header-logo">AI Racer</span>
      <span class="session-name">—</span>
      <span class="session-type-badge"></span>
      <span class="replay-badge">REPLAY</span>
    </div>
    <div class="header-right">
      <span id="header-time"></span>
      <a class="btn-back" href="index.html">← 返回列表</a>
    </div>
  </div>

  <!-- Main content: minimap + leaderboard -->
  <div id="main-area">
    <div id="minimap-container">
      <canvas id="minimap" width="600" height="380"></canvas>
    </div>
    <div id="leaderboard-panel">
      <div class="lb-header">实时排名</div>
      <div style="color:var(--text-dim);padding:20px;text-align:center;font-size:13px">等待数据...</div>
    </div>
  </div>

  <!-- Playback controls -->
  <div id="controls">
    <button id="btn-rewind" title="回到开头">⏮</button>
    <button id="btn-play" title="播放/暂停" disabled>▶</button>
    <input type="range" id="timeline" min="0" max="100" step="0.1" value="0">
    <span id="time-display">--:--.-- / --:--.--</span>
    <button class="speed-btn active" data-speed="1">1×</button>
    <button class="speed-btn" data-speed="2">2×</button>
    <button class="speed-btn" data-speed="4">4×</button>
  </div>

  <!-- Event log -->
  <div id="event-log">暂无事件</div>
</div>

<script src="minimap.js"></script>
<script src="leaderboard.js"></script>
<script src="replay.js"></script>
</body>
</html>
